<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil do Usuário</title>
  <link rel="stylesheet" href="style.css">
  <!-- Biblioteca jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-100">

  <div class="caixa-perfil">
    <header>
      <h1 class="titulo-laranja">Perfil do Usuário</h1>
    </header>

    <div class="perfil-container">
      <!-- Dados -->
      <div class="dados">
        <label>Nome Completo:</label>
        <input type="text" id="nome" placeholder="Digite seu nome completo" required>

        <label>CPF:</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" required>

        <label>Endereço:</label>
        <input type="text" id="endereco" placeholder="Rua, número, bairro, cidade" required>

        <label>Telefone:</label>
        <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>

        <label>E-mail:</label>
        <input type="email" id="email" placeholder="exemplo@email.com" required>

        <label>Senha:</label>
        <input type="password" id="senha" placeholder="Digite sua senha" required>

        <label>Nova Senha:</label>
        <input type="password" id="novaSenha" placeholder="Digite a nova senha">
      </div>

      <!-- Foto -->
      <div class="foto">
        <img id="previewFoto" src="default.png" alt="Foto do usuário">
        
        <!-- Botão customizado -->
        <label for="fotoPerfil" class="btn-laranja">Selecionar Foto</label>
        <input type="file" id="fotoPerfil" accept="image/*" style="display:none;">
        
        <!-- Nome do arquivo -->
        
      </div>
    </div>

    <!-- Botões -->
    <div>
      <button id="btnSalvar" class="btn-verde" onclick="window.location='home.html'">Salvar</button>
      <button id="btnPDF" class="btn-laranja">Gerar PDF</button>
    </div>
  </div>

  <script>
    const { jsPDF } = window.jspdf;

    // Preview da foto e nome do arquivo
    document.getElementById("fotoPerfil").addEventListener("change", function(event) {
      const reader = new FileReader();
      const file = event.target.files[0];

      if(file){
        reader.onload = function(){
          document.getElementById("previewFoto").src = reader.result;
          localStorage.setItem("fotoPerfil", reader.result);
        };
        reader.readAsDataURL(file);

        document.getElementById("nomeArquivo").textContent = "Arquivo selecionado: " + file.name;
      } else {
        document.getElementById("nomeArquivo").textContent = "Nenhum arquivo escolhido";
      }
    });

    // Botão Salvar
    document.getElementById("btnSalvar").addEventListener("click", function(){
      const dados = {
        nome: document.getElementById("nome").value,
        cpf: document.getElementById("cpf").value,
        endereco: document.getElementById("endereco").value,
        telefone: document.getElementById("telefone").value,
        email: document.getElementById("email").value,
        senha: document.getElementById("senha").value,
        novaSenha: document.getElementById("novaSenha").value
      };
      localStorage.setItem("perfilUsuario", JSON.stringify(dados));
      alert("✅ Dados salvos com sucesso!");
    });

    // Botão Gerar PDF
    document.getElementById("btnPDF").addEventListener("click", function(){
      const dados = JSON.parse(localStorage.getItem("perfilUsuario")) || {};
      const foto = localStorage.getItem("fotoPerfil");

      const doc = new jsPDF();
      doc.setFont("helvetica", "bold");
      doc.setFontSize(16);
      doc.text("PERFIL DO USUÁRIO", 105, 20, { align: "center" });

      doc.setFontSize(12);
      doc.setFont("helvetica", "normal");
      doc.text(`Nome: ${dados.nome || ""}`, 20, 40);
      doc.text(`CPF: ${dados.cpf || ""}`, 20, 50);
      doc.text(`Endereço: ${dados.endereco || ""}`, 20, 60);
      doc.text(`Telefone: ${dados.telefone || ""}`, 20, 70);
      doc.text(`E-mail: ${dados.email || ""}`, 20, 80);

      // Adiciona foto se existir
      if (foto) {
        doc.addImage(foto, "JPEG", 150, 40, 40, 40);
      }

      doc.save("PerfilUsuario.pdf");
    });

    // Carregar dados salvos ao abrir
    window.onload = function(){
      const dados = JSON.parse(localStorage.getItem("perfilUsuario")) || {};
      if(dados.nome) document.getElementById("nome").value = dados.nome;
      if(dados.cpf) document.getElementById("cpf").value = dados.cpf;
      if(dados.endereco) document.getElementById("endereco").value = dados.endereco;
      if(dados.telefone) document.getElementById("telefone").value = dados.telefone;
      if(dados.email) document.getElementById("email").value = dados.email;
      if(dados.senha) document.getElementById("senha").value = dados.senha;
      if(dados.novaSenha) document.getElementById("novaSenha").value = dados.novaSenha;

      const foto = localStorage.getItem("fotoPerfil");
      if(foto) document.getElementById("previewFoto").src = foto;
    };
  </script>

  <script></script>
</body>
</html>
